<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Movie Guessing Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <h1 class="title">Movie Guessing Game</h1>
    <p class="subtitle">Guess the movie from its synopsis. Good luck!</p>
    <nav class="nav"><a href="/discovery.html">Discoveries</a></nav>
    </header>

    <main class="card">
      <section class="left">
        <h2 class="section-title">Synopsis</h2>
        <p id="synopsis" class="synopsis">Click "Start Game" to begin.</p>
      </section>

      <aside class="right">
        <div class="status">
          <div class="attempts" id="attemptsContainer">Attempts: <span id="attempts"></span></div>
          <div id="stats" style="font-weight:600">Wins: 0 - Losses: 0</div>
        </div>

        <div class="controls">
          <div class="autocomplete">
            <input id="guessInput" class="input" placeholder="Your guess..." disabled />
            <div id="suggestions" class="suggestions hidden" aria-hidden="true"></div>
          </div>
          <button id="guessBtn" class="btn primary" onclick="makeGuess()" disabled>Guess</button>
          <button class="btn secondary start" onclick="startGame()">Start New Game</button>
        </div>

        <p id="result" class="result"></p>
        <button id="saveDiscoveryBtn" class="btn tertiary" style="display:none;margin-top:8px">Save to Discoveries</button>
      </aside>
    </main>

    <footer class="footer">
      <small>Using TMDB API</small>
      <div style="margin-top:8px">
        <button id="resetProgress" class="btn tertiary reset-btn" title="Reset wins and losses">Reset Progress</button>
      </div>
    </footer>
  </div>
  </script>
    <script src="utils.js"></script>
    <script src="script.js"></script>
</body>
</html>
